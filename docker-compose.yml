services:
  db:
    image: postgis/postgis:16-3.4
    container_name: contractor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: contractor
      POSTGRES_PASSWORD: contractor
      POSTGRES_DB: contractor_bidder
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contractor -d contractor_bidder"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: contractor_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
