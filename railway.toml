# Railway config-as-code for the DOJOBID API service.
# https://docs.railway.com/reference/config-as-code
#
# After pushing, attach a persistent volume in the Railway dashboard:
#   Service → Settings → Volumes → Add Volume → Mount path: /data/media
# Then set Variables (Step 6c in docs/Deploy-Vercel-Railway-Neon.md).

[build]
buildCommand = "npm ci && npm run db:generate --workspace apps/api && npm run build --workspace apps/api"
watchPatterns = ["apps/api/**", "packages/**"]

[deploy]
startCommand = "npm run prisma:deploy --workspace apps/api && npm run start:prod --workspace apps/api"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
