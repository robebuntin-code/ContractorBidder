name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: contractor
          POSTGRES_PASSWORD: contractor
          POSTGRES_DB: contractor_bidder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contractor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://contractor:contractor@localhost:5432/contractor_bidder?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm run test

      - name: Apply migrations
        run: npm run db:deploy --workspace @contractor-bidder/api --if-present || npm run prisma:deploy --workspace @contractor-bidder/api

      - name: Build
        run: npm run build
